name: pages
on:
  schedule:   # 2026-07-08 スケジューラ再登録のため更新
    - cron: "17 * * * *"     # 毎時17分にダッシュボード再生成
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["site/**", "build_site.py", "viz_hub.py", "*_template.html"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: build site
        run: python3 build_site.py
      - uses: actions/configure-pages@v6
        with:
          enablement: true   # 初回にPagesを自動有効化
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
